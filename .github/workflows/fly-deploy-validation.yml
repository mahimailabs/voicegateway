name: Fly Deploy Validation

on:
  push:
    branches: [main]
    paths:
      - 'deploy/fly/**'
      - 'Dockerfile'
      - '.github/workflows/fly-deploy-validation.yml'
  pull_request:
    branches: [main]
    paths:
      - 'deploy/fly/**'
      - 'Dockerfile'

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Validate fly.toml
        working-directory: deploy/fly
        run: flyctl config validate

      - name: Lint deploy.sh
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
          shellcheck deploy/fly/deploy.sh

      - name: Test Docker build
        run: docker build -f Dockerfile -t voicegateway:ci-test .
