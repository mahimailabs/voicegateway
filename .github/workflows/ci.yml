name: Continuous Integration

on:
  pull_request:
    paths:
      - 'voicegateway/**'
      - 'dashboard/api/**'
      - 'tests/**'
      - 'pyproject.toml'
      - '.github/workflows/ci.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup uv
        uses: astral-sh/setup-uv@v5
      - name: Setup Python
        run: uv python install 3.12
      - name: Create venv and install
        run: |
          uv venv
          uv pip install -e ".[dev]" ruff mypy types-PyYAML
      - name: Ruff
        run: uv run ruff check voicegateway dashboard tests
      - name: Mypy
        run: uv run mypy voicegateway dashboard
      - name: Pytest
        run: uv run pytest -q --ignore=tests/test_providers/test_ollama.py
