name: Publish Docker Images

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: docker.io
  CORE_IMAGE: mahimairaja/voicegateway
  DASHBOARD_IMAGE: mahimairaja/voicegateway-dashboard

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Setup Python
        run: uv python install 3.12

      - name: Install dependencies
        run: |
          uv venv --clear --seed
          uv pip install -e ".[dev,dashboard,mcp]"

      - name: Run tests
        run: uv run pytest --tb=short --ignore=tests/providers

  publish-core:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.CORE_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=VoiceGateway
            org.opencontainers.image.description=Self-hosted inference gateway for voice AI with MCP
            org.opencontainers.image.url=https://voicegateway.dev
            org.opencontainers.image.documentation=https://docs.voicegateway.dev
            org.opencontainers.image.source=https://github.com/mahimailabs/voicegateway
            org.opencontainers.image.authors=Mahimai Labs
            org.opencontainers.image.licenses=MIT

      - name: Build and push core image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=core
          cache-to: type=gha,mode=max,scope=core
          build-args: |
            VERSION=${{ steps.version.outputs.version }}

      - name: Update Docker Hub README
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.CORE_IMAGE }}
          readme-filepath: ./docker/README.voicegateway.md
          short-description: "Self-hosted inference gateway for voice AI with MCP"

  publish-dashboard:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DASHBOARD_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=VoiceGateway Dashboard
            org.opencontainers.image.description=Web dashboard for VoiceGateway with full CRUD
            org.opencontainers.image.source=https://github.com/mahimailabs/voicegateway
            org.opencontainers.image.authors=Mahimai Labs
            org.opencontainers.image.licenses=MIT

      - name: Build and push dashboard image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./dashboard/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=dashboard
          cache-to: type=gha,mode=max,scope=dashboard

      - name: Update Docker Hub README
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.DASHBOARD_IMAGE }}
          readme-filepath: ./docker/README.dashboard.md
          short-description: "Web dashboard for VoiceGateway"

  create-release:
    needs: [publish-core, publish-dashboard]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Docker Images

            Published to Docker Hub:

            - `mahimairaja/voicegateway:${{ steps.version.outputs.version }}`
            - `mahimairaja/voicegateway:latest`
            - `mahimairaja/voicegateway-dashboard:${{ steps.version.outputs.version }}`
            - `mahimairaja/voicegateway-dashboard:latest`

            Built for `linux/amd64` and `linux/arm64`.

            ## Quick Start

            ```bash
            docker run -p 8080:8080 \
              -v $(pwd)/voicegw-data:/data \
              mahimairaja/voicegateway:${{ steps.version.outputs.version }}
            ```

            See [docs.voicegateway.dev](https://docs.voicegateway.dev) for full documentation.
