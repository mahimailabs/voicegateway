# deploy/fly/fly.toml
# VoiceGateway on Fly.io
# Generated by deploy.sh — customize as needed

app = "CHANGEME"
primary_region = "ord"

# Use published image for fast deploys (~30s vs ~3min from source)
[build]
  image = "mahimairaja/voicegateway:latest"
  # To build from source instead, comment out 'image' and uncomment:
  # dockerfile = "../../Dockerfile"

[env]
  VOICEGW_CONFIG = "/data/voicegw.yaml"
  VOICEGW_DB_PATH = "/data/voicegw.db"
  PYTHONUNBUFFERED = "1"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 50
    soft_limit = 25

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/health"
    protocol = "http"
    timeout = "5s"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[[mounts]]
  source = "voicegw_data"
  destination = "/data"
  initial_size = "1gb"
